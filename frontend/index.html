<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Étudiants - Dashboard</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-graduation-cap text-primary me-2"></i> Annuaire Étudiants</h2>
        <button class="btn btn-outline-secondary shadow-sm" onclick="resetForm()">
            <i class="fas fa-sync-alt"></i> Réinitialiser
        </button>
    </div>

    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 bg-primary text-white">
                <div class="card-body text-center">
                    <i class="fas fa-users fa-2x mb-2"></i>
                    <h5>Total Étudiants</h5>
                    <h2 id="totalCount">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow-sm border-0 bg-success text-white">
                <div class="card-body text-center">
                    <i class="fas fa-project-diagram fa-2x mb-2"></i>
                    <h5>Filières Distinctes</h5>
                    <h2 id="filiereCount">0</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-4 shadow-sm border-0">
        <div class="card-body">
            <h5 class="card-title mb-3" id="formTitle"><i class="fas fa-plus-circle me-2"></i>Informations Étudiant</h5>
            <form id="studentForm" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label small fw-bold">Nom Complet</label>
                    <input type="text" id="nom" class="form-control" placeholder="Ex: Aya Ezzaytouny" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="exemple@ecole.ma" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold">Téléphone</label>
                    <input type="text" id="telephone" class="form-control" placeholder="06XXXXXXXX" maxlength="10">
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold">Adresse</label>
                    <input type="text" id="adresse" class="form-control" placeholder="Adresse complète">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold">Filière</label>
                    <input type="text" id="filiere" class="form-control" placeholder="Ex: IT Engineering" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-bold">Niveau (1-5)</label>
                    <input type="number" id="niveau" class="form-control" min="1" max="5" value="1" required>
                </div>
                <div class="col-12 mt-4">
                    <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-2">
                        <i class="fas fa-save me-2"></i>Enregistrer l'étudiant
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <div class="row g-3 mb-4 align-items-center">
                <div class="col-md-3">
                    <h5 class="card-title mb-0"><i class="fas fa-list me-2"></i>Liste des inscrits</h5>
                </div>
                <div class="col-md-3 text-end">
                    <div class="btn-group w-100" role="group">
                        <button type="button" class="btn btn-outline-primary active" id="viewTableBtn">
                            <i class="fas fa-table"></i> Tableau
                        </button>
                        <button type="button" class="btn btn-outline-primary" id="viewCardsBtn">
                            <i class="fas fa-th-large"></i> Cartes
                        </button>
                    </div>
                </div>
                <div class="col-md-2">
                    <select id="filterNiveau" class="form-select">
                        <option value="">Années</option>
                        <option value="1">1ère</option>
                        <option value="2">2ème</option>
                        <option value="3">3ème</option>
                        <option value="4">4ème</option>
                        <option value="5">5ème</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
                        <input type="text" id="searchInput" class="form-control border-start-0" placeholder="Rechercher...">
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <button class="btn btn-info btn-sm text-white" onclick="sendEmails()">
                    <i class="fas fa-envelope me-1"></i> Envoyer un email à la sélection
                </button>
            </div>

            <div id="displayContainer">
                <div class="table-responsive" id="tableView">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 40px;"></th>
                                <th>Nom</th>
                                <th>Email</th>
                                <th>Téléphone</th>
                                <th>Filière & Année</th>
                                <th class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentList">
                            </tbody>
                    </table>
                </div>

                <div id="cardView" class="row g-3 d-none">
                    </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="studentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="fas fa-user-graduate me-2"></i> Profil Étudiant</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center" id="modalContent">
                </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/app.js"></script>
</body>
</html>
