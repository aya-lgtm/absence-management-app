<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>HEM — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone {
      width: 390px;
      min-height: 100vh;
      background: #fff;
      padding: 60px 28px 40px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 36px;
    }
    .topbar svg { color: #1a1a2e; }

    /* TITLE */
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 14px;
      color: #9aa0b4;
      margin-bottom: 36px;
    }

    /* FIELDS */
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    .input-wrap {
      position: relative;
    }
    .field input {
      width: 100%;
      border: 1.5px solid #e8eaf0;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      color: #1a1a2e;
      font-family: 'Poppins', sans-serif;
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #3b5bfc; }
    .field input::placeholder { color: #c0c4d4; }

    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9aa0b4;
      display: flex;
      align-items: center;
    }

    /* REMEMBER + FORGOT */
    .options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #1a1a2e;
      cursor: pointer;
    }
    .remember input[type="checkbox"] { display: none; }
    .checkbox-custom {
  width: 20px; height: 20px;
  border-radius: 6px;
  background: #fff;
  border: 1.5px solid #e8eaf0;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s, border-color 0.2s;
}
.checkbox-custom svg { 
  color: white; 
  opacity: 0;
  transition: opacity 0.2s;
}
.remember input[type="checkbox"]:checked ~ .checkbox-custom {
  background: #3b5bfc;
  border-color: #3b5bfc;
}
.remember input[type="checkbox"]:checked ~ .checkbox-custom svg {
  opacity: 1;
}
    .forgot {
      font-size: 13px;
      color: #3b5bfc;
      font-weight: 500;
      text-decoration: none;
    }
    .forgot:hover { text-decoration: underline; }

    /* ERROR */
    .error-msg {
      display: none;
      background: #fff0f0;
      border: 1px solid #ffcccc;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #e05252;
      margin-bottom: 16px;
    }
    .error-msg.show { display: block; }

    /* BUTTON */
    .btn-login {
      width: 100%;
      background: #3b5bfc;
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 24px;
    }
    .btn-login:hover { background: #2a47e0; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-login .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    

    
  </style>
</head>
<body>
<div class="phone">

  <!-- TOP BAR -->
  <div class="topbar">
    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
  </div>

  <!-- TITLE -->
  <h1>Bienvenue !</h1>
  <p class="subtitle">Connectez-vous à votre compte</p>

  <!-- ERROR -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- EMAIL -->
  <div class="field">
    <label>Email</label>
    <div class="input-wrap">
      <input type="email" id="email" placeholder="exemple@hem.ac.ma" autocomplete="email"/>
    </div>
  </div>

  <!-- PASSWORD -->
  <div class="field">
    <label>Mot de passe</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="••••••••••" autocomplete="current-password"/>
      <button class="eye-btn" onclick="togglePassword()" type="button">
        <svg id="eyeIcon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- OPTIONS -->
  <div class="options">
    <label class="remember">
      <input type="checkbox" id="remember" />
      <div class="checkbox-custom">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      Se souvenir de moi
    </label>
    <a href="#" class="forgot" onclick="showForgotMessage()">Mot de passe oublié ?</a>
  </div>

  <!-- BUTTON -->
  <button class="btn-login" id="loginBtn" onclick="handleLogin()">
    <span class="btn-text">Se connecter</span>
    <div class="spinner"></div>
  </button>

  

 

</div>

<script>
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

  function togglePassword() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  async function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('remember').checked; // ← récupère l'état
    const btn      = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    errorMsg.classList.remove('show');
    if (!email || !password) { showError('Veuillez remplir tous les champs.'); return; }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const response = await fetch(
        'http://localhost:8888/absence-management-app/backend/api/index.php?route=login',
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        }
      );

      const data = await response.json();
      if (!response.ok || !data.success) {
        showError(data.error || 'Email ou mot de passe incorrect.');
        return;
      }

      // "Se souvenir de moi" — sessionStorage si décoché, localStorage si coché
      const storage = remember ? localStorage : sessionStorage;
      storage.setItem('token', data.token);
      storage.setItem('user', JSON.stringify(data.user));

      const role = data.user.role;
      if (role === 'admin' || role === 'assistant' || role === 'responsable') {
        window.location.href = 'admin-dashboard.html';
      } else if (role === 'professor') {
        window.location.href = '../dev2-absences/course-selection.html';
      }

    } catch (err) {
      showError('Erreur de connexion au serveur. Vérifiez que le backend est actif.');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }

  // NOUVEAU
const token = localStorage.getItem('token') || sessionStorage.getItem('token');
const user  = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || '{}');
if (token && user.role) window.location.href = 'admin-dashboard.html';


  function showForgotMessage() {
  showError('Contactez votre administrateur pour réinitialiser votre mot de passe.');
}



  
</script>
</body>
</html>
