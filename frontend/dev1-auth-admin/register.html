<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>HEM — Inscription</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .phone { width: 390px; min-height: 100vh; background: #fff; padding: 60px 28px 40px; display: flex; flex-direction: column; position: relative; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .back-btn { background: none; border: none; font-size: 15px; color: #3b5bfc; font-weight: 500; cursor: pointer; font-family: 'Poppins', sans-serif; }
    h1 { font-size: 28px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #9aa0b4; margin-bottom: 32px; }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 14px; font-weight: 500; color: #1a1a2e; margin-bottom: 8px; }
    .field input { width: 100%; border: 1.5px solid #e8eaf0; border-radius: 12px; padding: 14px 16px; font-size: 15px; color: #1a1a2e; font-family: 'Poppins', sans-serif; background: #fff; outline: none; transition: border-color 0.2s; }
    .field input:focus { border-color: #3b5bfc; }
    .field input::placeholder { color: #c0c4d4; }
    .roles-label { font-size: 14px; font-weight: 500; color: #1a1a2e; margin-bottom: 10px; }
    .roles-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .role-btn { padding: 12px; border-radius: 10px; border: 1.5px solid #e8eaf0; background: #f8f9ff; font-size: 13px; font-weight: 500; color: #9aa0b4; cursor: pointer; font-family: 'Poppins', sans-serif; transition: all 0.2s; text-align: center; }
    .role-btn.active { background: #3b5bfc; border-color: #3b5bfc; color: #fff; }
    .error-msg { display: none; background: #fff0f0; border: 1px solid #ffcccc; border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #e05252; margin-bottom: 16px; }
    .error-msg.show { display: block; }
    .btn { width: 100%; background: #3b5bfc; color: #fff; border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 600; font-family: 'Poppins', sans-serif; cursor: pointer; transition: background 0.2s; margin-bottom: 24px; }
    .btn:hover { background: #2a47e0; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn .spinner { display: none; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
    .btn.loading .btn-text { display: none; }
    .btn.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .login-link { text-align: center; font-size: 13px; color: #9aa0b4; }
    .login-link a { color: #3b5bfc; font-weight: 600; text-decoration: none; }
    .login-link a:hover { text-decoration: underline; }
    @media (max-width: 420px) { .phone { width: 100%; padding: 50px 20px 30px; } }
  </style>
</head>
<body>
<div class="phone">
  <div class="topbar">
    <button class="back-btn" onclick="window.location.href='login.html'">← Retour</button>
  </div>
  <h1>Créer un compte</h1>
  <p class="subtitle">Rejoignez le système HEM</p>
  <div class="error-msg" id="errorMsg"></div>
  <div class="field"><label>Prénom *</label><input type="text" id="first_name" placeholder="Votre prénom"/></div>
  <div class="field"><label>Nom *</label><input type="text" id="last_name" placeholder="Votre nom"/></div>
  <div class="field"><label>Email *</label><input type="email" id="email" placeholder="exemple@hem.ac.ma"/></div>
  <div class="field"><label>Mot de passe *</label><input type="password" id="password" placeholder="••••••••"/></div>
  <p class="roles-label">Rôle *</p>
  <div class="roles-grid">
    <button class="role-btn active" data-role="professor" onclick="selectRole(this)">Professeur</button>
    <button class="role-btn" data-role="admin" onclick="selectRole(this)">Administrateur</button>
    <button class="role-btn" data-role="assistant" onclick="selectRole(this)">Assistante</button>
    <button class="role-btn" data-role="responsable" onclick="selectRole(this)">Responsable</button>
  </div>
  <div class="field"><label>Campus ID</label><input type="number" id="campus_id" placeholder="ID du campus (optionnel)"/></div>
  <button class="btn" id="registerBtn" onclick="handleRegister()">
    <span class="btn-text">S'inscrire</span>
    <div class="spinner"></div>
  </button>
  <div class="login-link">Déjà un compte ? <a href="login.html">Se connecter</a></div>
</div>
<script>
  let selectedRole = 'professor';
  function selectRole(btn) {
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedRole = btn.dataset.role;
  }
  async function handleRegister() {
    const first_name = document.getElementById('first_name').value.trim();
    const last_name  = document.getElementById('last_name').value.trim();
    const email      = document.getElementById('email').value.trim();
    const password   = document.getElementById('password').value;
    const campus_id  = document.getElementById('campus_id').value;
    const btn        = document.getElementById('registerBtn');
    const errorMsg   = document.getElementById('errorMsg');
    errorMsg.classList.remove('show');
    if (!first_name || !last_name || !email || !password) { showError('Veuillez remplir tous les champs obligatoires.'); return; }
    btn.classList.add('loading'); btn.disabled = true;
    try {
      const res = await fetch('http://localhost:8888/absence-management-app/backend/api/index.php?route=register', {
    method: 'POST',
    headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${localStorage.getItem('token')}`
    },
    body: JSON.stringify({ first_name, last_name, email, password, role: selectedRole, campus_id: campus_id || null })
});
      const data = await res.json();
      if (!res.ok || !data.success) { showError(data.error || 'Erreur lors de l\'inscription.'); return; }
      alert('Compte créé avec succès !');
      window.location.href = 'login.html';
    } catch { showError('Erreur de connexion au serveur.'); }
    finally { btn.classList.remove('loading'); btn.disabled = false; }
  }
  function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.classList.add('show'); }
</script>
</body>
</html>
